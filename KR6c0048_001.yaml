body:
  text: 六祖大鑒禪師説法性圓寂本無生滅因有生念遂有生緣故天得命之以生是故謂之命天命既立真空不有前日生念轉而為意識意識之用散而為六根六根各有分別中有所總持者是故謂之心心者念慮之所在也神識之所舍也真妄之所共處者也當凡夫聖賢機會之地也一切衆生自無始來不能離生滅者皆為此心所纍故諸佛惟教人了此心此心了即見自性見自性則是菩提也此在性時皆自空寂而湛然若無緣有生念而後有者也有生則有形形者地水火風之聚沫也以血氣為體有生者之所託也血氣足則精足精足則生神神足生妙用然則妙用者即在吾圓寂時之真我也因形之遇物故見之於作為而已但凡夫迷而逐物聖賢明而應物逐物者自彼應物者自我自彼者著於所見故受輪回自我者當體常空萬劫如一合而觀之皆心之妙用也是故當其未生之時所謂性者圓滿具足空然無物湛乎自然其廣大與虗空等往來變化一切自由天雖欲命我以生其可得乎天猶不能命我以生況於四大乎況於五行乎既有生念又有生緣故天得以生命我四大得以氣形我五行得以數約我此有生者之所以有滅也然乎生滅則一在凡夫聖賢之所以生滅則殊凡夫之人生緣念有識隨業變習氣薰染因生愈甚故既生之後心著諸妄妄認四大以為我身妄認六親以為我有妄認聲色以為快樂妄認塵勞以為富貴心目知見無所不妄諸妄既起煩惱萬差妄念奪真真性遂隱人我為主真識為客三業前引百業後隨流浪生死無有涯際生盡則滅滅盡復生生滅相尋至墮諸趣轉轉不知愈恣無明造諸業遂至塵沙劫盡不復人身聖賢則不然聖賢生不因念應迹而生欲生則生不待彼命故既生之後圓寂之性依舊湛然無體相無罣礙其照萬法如青天白日無毫髮隱滯故能建立一切善法遍於沙界不見其少攝受一切衆生歸於寂滅不以為多驅之不能來逐之不能去雖托四大為形五行為養皆我所假未嘗妄認我緣苟盡我迹當滅委而去之如來去耳於我何與哉是故凡夫有生則有滅滅者不能不生賢聖有生亦有滅滅者歸於真空是故凡夫生滅如身中影出入相隨無有盡時聖賢生滅如空中雷自發自止不纍於物世人不知生滅之如此而以生滅為煩惱大患蓋不自覺也覺則見生滅如身上塵當一振奮耳何能纍我性哉昔我如來以大慈悲心憫一切衆生迷錯顛倒流浪生死之如此又見一切衆生本有快樂自在性皆可修證成佛欲一切衆生盡為聖賢生滅不為凡夫生滅猶慮一切衆生無始以來流浪日久其種性已差未能以一法速悟故為説八萬四千法門門門可入皆可到真如之地每説一法門莫非丁寧實語欲使一切衆生各隨所見法門入自心地到自心地見自佛性證自身佛即同如來是故如來於諸經説有者欲使一切衆生覩相生善説無者欲使一切衆生離相見性所説色空亦復如是然而衆生執著見有非真有見無非真無其見色見空皆如是執著復起斷常二見轉為生死根蒂不示以無二法門又將迷錯顛倒流浪生死甚於前日故如來又為説大般若法破斷常二見使一切衆生知真有真無真色真空本來無二亦不遠人湛然寂靜只在自己性中但以自己性智慧照破諸妄則曉然自見是故大般若經六百卷皆如來為菩薩果人説佛性然而其間猶有為頓漸者説惟金剛經為發大乘者説為發最上乘者説是故其經先説四生四相次云凡所有相皆是虗妄若見諸相非相即見如來蓋顯一切法至無所住是為真諦故如來於此經凡説涉有即破之以非直取實相以示衆生蓋恐衆生不解佛所説其心反有所住故也如所謂佛法即非佛法之類是也金剛經疏論纂要二卷唐宗密述金剛經疏論纂要刊定記四卷宋子璿記
